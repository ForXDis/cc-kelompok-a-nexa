# ============================================================
# Docker Compose — Cloud App
# Komputasi Awan — SI ITK
# ============================================================
# Usage:
#   docker compose up -d          # Start semua services
#   docker compose up -d --build  # Paksa build ulang jika ada perubahan kode
#   docker compose down           # Stop & remove
#   docker compose logs -f        # Lihat logs
#   docker compose ps              # Status services
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: studyfy          # <-- Benar, sesuai dengan nama database
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studyfy"]  # <-- DIPERBAIKI (sebelumnya cloudapp)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== BACKEND ====================
  backend:
    image: dzaky975/cc-kelompok-a-nexa-backend:1.0
    container_name: cloudapp-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker       # <-- Mengambil DATABASE_URL dari sini
    ports:
      - "8000:8000"
    networks:
      - cloudnet
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    image: dzaky975/cc-kelompok-a-nexa-frontend:1.0
    container_name: cloudapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - cloudnet
    depends_on:
      - backend

# ==================== VOLUMES ====================
volumes:
  pgdata:
    name: studyfy-pgdata

# ==================== NETWORKS ====================
networks:
  cloudnet:
    name: studyfy-network
    driver: bridge